title: wermgr.exe Spawning Shell or Console Process
id: c3d4e5f6-a7b8-9012-cdef-012345678892
status: stable
description: |
  Detects wermgr.exe (Windows Error Reporting Manager) spawning a command shell, PowerShell,
  or interactive console process. In normal operation, wermgr.exe never spawns interactive shells.
  In the RoguePlanet LPE exploit, the SYSTEM-context wermgr.exe payload calls LaunchConsoleInSessionId()
  which spawns conhost.exe in the user's interactive session, delivering a SYSTEM shell.
  This rule also covers cases where the attacker uses cmd.exe or PowerShell as their post-exploitation
  entry point after obtaining SYSTEM access.
author: threat-reports
date: 2026-06-18
references:
  - https://github.com/MSNightmare/RoguePlanet
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    ParentImage|endswith: '\wermgr.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\conhost.exe'
  condition: selection
falsepositives:
  - None known for these specific child processes; wermgr.exe does not legitimately spawn shells
level: high
tags:
  - attack.defense_evasion
  - attack.t1036
  - attack.privilege_escalation
  - attack.t1068
  - attack.execution
  - attack.t1059.001
